name: Build macOS app

# Builds the unsigned .dmg. Must run on macOS — scripts/electron-builder-wrapper.js picks its
# targets from process.platform, so a .dmg cannot be produced from Windows or Linux.
#
# Intel runner on purpose: openblock-tools only ships a darwin-x64 build (no arm64), so the
# app is x64 too and the whole stack runs under Rosetta 2 on Apple Silicon. macos-13, which
# upstream used, was retired on 2025-12-04; macos-15-intel is the x64 replacement.
#
# Delivery: a GitHub Release, not an Actions artifact. Artifact downloads can't be resumed and
# stall/throttle on multi-GB files, so a shaky connection never finishes them. Release assets
# support HTTP range requests -> a download manager (aria2, IDM, wget -c) can resume them.
# The dmg is now LZMA-compressed (electron-builder.yaml: dmg.format ULMO), so it should fit the
# 2 GiB per-asset limit; if it ever doesn't, the job splits it into parts that still resume.

on:
  workflow_dispatch:

permissions:
  contents: write   # needed to publish the Release (was: read)

jobs:
  build-mac:
    runs-on: macos-15-intel
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      # Node 16 is not optional: the build fails on newer majors.
      - uses: actions/setup-node@v4
        with:
          node-version: '16.x'

      # node-gyp 8 (bundled with npm 8) rejects the Python 3.13 that ships on macOS 15.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Point node-gyp at Python 3.11
        run: npm config set python "$(which python3)"

      - name: Install dependencies
        run: npm ci

      # clean + compile + fetch:all (~1 GB darwin toolchain) + electron-builder.
      # Signing is already disabled inside the wrapper, so only the dmg target builds.
      - name: Build dmg
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max_old_space_size=8192
          CSC_IDENTITY_AUTO_DISCOVERY: false
          USE_HARD_LINKS: false
        run: npm run dist

      - name: Show what was built
        run: ls -lh dist/*.dmg

      - name: Publish dmg to a GitHub Release (resumable; auto-split if over 2 GiB)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          dmg=$(ls dist/*.dmg | head -n1)
          base=$(basename "$dmg")
          tag="mac-latest"

          # Rolling release: drop the previous one so old assets don't accumulate.
          gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true

          cat > notes.md <<'EOF'
          Unsigned macOS build (x64 - runs natively on Intel, under Rosetta 2 on Apple Silicon).

          Download with a resume-capable manager (aria2 / IDM / a browser that resumes): the
          asset supports resuming, so a dropped connection continues instead of restarting.

          If the release lists several `*.part-aa`, `*.part-ab`, ... files, download them ALL into
          one folder and join them (order is alphabetical):

              cat OpenBlock-Desktop_*.dmg.part-* > OpenBlock-Desktop.dmg

          then open the resulting `.dmg`.
          EOF

          gh release create "$tag" \
            --title "OpenBlock Desktop - macOS (x64)" \
            --notes-file notes.md

          # Split threshold well under the hard 2 GiB (2,147,483,648 B) per-asset cap.
          limit=$((2000 * 1000 * 1000))   # 1.86 GiB
          size=$(stat -f%z "$dmg")

          if [ "$size" -le "$limit" ]; then
            gh release upload "$tag" "$dmg" --clobber
          else
            ( cd dist && split -b 1900m "$base" "${base}.part-" )
            gh release upload "$tag" dist/"${base}".part-* --clobber
          fi
